version: v2

managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/leighmacdonald/gbans/internal/rpc

plugins:
  - local: [protoc-gen-go]
    out: internal/rpc
    opt: paths=source_relative
  - local: [protoc-gen-connect-go]
    out: internal/rpc
    opt:
      - paths=source_relative
      - simple

inputs:
  - directory: proto
