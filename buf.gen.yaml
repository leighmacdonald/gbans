version: v2

managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/leighmacdonald/gbans/internal/rpc

plugins:
  - local: [protoc-gen-go]
    out: internal/rpc
    opt: paths=source_relative

  - local: [protoc-gen-connect-go]
    out: internal/rpc
    opt:
      - paths=source_relative
      - simple

  - local: protoc-gen-es
    out: frontend/src/gen
    include_imports: true
    opt:
      - target=ts

  - local: [frontend/node_modules/.bin/protoc-gen-connect-query]
    out: frontend/src/gen
    opt:
      - target=ts

inputs:
  - directory: proto
