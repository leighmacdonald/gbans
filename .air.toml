env_files = [".env"]

[build]
cmd = "go generate && CGO_ENABLED=0 go build -gcflags=all=\"-N -l\" -o ./tmp/main-gbans . && killall -9 main-gbans || true"
full_bin = "dlv exec --listen=127.0.0.1:2345 --headless=true --api-version=2 --accept-multiclient --check-go-version=false --continue --log ./tmp/main"
rerun = true
include_dir = ["internal", "pkg", "proto"]
include_file = ["main.go"]
exclude_regex = ["testdata", "frotend/rpc", "internal/rpc"]
delay = 2500
send_interrupt = false
stop_on_error = true

[proxy]
enabled = false
