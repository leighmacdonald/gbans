edition = "2023";

package stats.v1;

import "buf/validate/validate.proto";
import "database/query/v1/filter.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "maps/v1/maps.proto";
import "person/v1/person_core.proto";

enum Team {
  TEAM_UNASSIGNED_UNSPECIFIED = 0;
  TEAM_SPEC = 1;
  TEAM_RED = 2;
  TEAM_BLU = 3;
}

service StatsService {
  // Query a single match
  rpc Match(MatchRequest) returns (MatchResponse) {
    // option idempotency_level = NO_SIDE_EFFECTS;
  }
  // Query all matches
  rpc QueryMatches(QueryMatchesRequest) returns (QueryMatchesResponse) {}
  // Query all matches belonging to a player
  rpc MatchesWithPlayer(MatchesWithPlayerRequest) returns (MatchesWithPlayerResponse) {}
  // Query
  // - Known buckets. Each leaf defines how the stats are grouped and queried.
  //   (Bukets)
  //   - Bucket (mvm)
  //     - ...
  //   - Bucket (casual)
  //     (TimeBuckets)
  //     - Yearly
  //     - Monthly
  //     - Alltime
  //       (Overall buckets)
  //       - Kills
  //       - Healing
  //       - Weapons
  //         (Variant Buckets)
  //         - Variant: scattergun
  //       - Classes
  //         (Variant Buckets)
  //         - Variant: soldier
  rpc QueryStats(QueryStatsRequest) returns (QueryStatsResponse) {}
  rpc WeaponList(google.protobuf.Empty) returns (WeaponListResponse) {}
  rpc MapList(google.protobuf.Empty) returns (MapListResponse) {}
  rpc Buckets(google.protobuf.Empty) returns (BucketsResponse) {}
}

message MatchesWithPlayerRequest {
  int64 steam_id = 1 [(buf.validate.field).int64 = {gte: 76561197960265729}];
}

message MapListResponse {
  repeated maps.v1.Map maps = 1;
}

message PlayerMatchHistory {
  string match_id = 1;
  int32 server_id = 2;
  string server_name = 3;
  string server_name_short = 4;
  int32 map_id = 5;
  string map_name = 6;
  int32 demo_id = 7;
  string bucket_name = 8;
  int32 bucket_id = 9;
  string hostname = 10;
  uint32 score_red = 11;
  uint32 score_blu = 12;
  uint64 duration = 13;
  bool is_winnder = 14;
  google.protobuf.Timestamp created_on = 15;
}

message MatchesWithPlayerResponse {
  repeated PlayerMatchHistory matches = 1;
}

message WeaponListResponse {
  repeated string weapons = 1;
}

// Bucket is the highest level grouping of stats. Non standard game modes should generally
// want to have a bucket per game mode so that stat sums can be broken down into numbers
// that are not skewed.
message Bucket {
  int32 stats_bucket_id = 1;
  string bucket_name = 2;
  bool is_enabled = 3;
}

message BucketsResponse {
  repeated Bucket buckets = 1;
}

// The Variant picked specifies which set of stats structs are being shown.
enum Variant {
  VARIANT_OVERALL_UNSPECIFIED = 0;
  VARIANT_KILLS = 1;
  VARIANT_HEALING = 2;
  VARIANT_WEAPONS = 3;
  VARIANT_CLASSES = 4;
}

// The TimeBucket enum corresponds to the truncated date uses for grouping and indexing.
enum TimeBucket {
  TIME_BUCKET_UNSPECIFIED = 0;
  TIME_BUCKET_DAILY = 1;
  TIME_BUCKET_WEEKLY = 7;
  TIME_BUCKET_MONTHLY = 31;
  TIME_BUCKET_YEARLY = 365;
  TIME_BUCKET_ALLTIME = 99999;
}

message QueryMatchesRequest {
  database.query.v1.Filter filter = 1;
  uint32 stats_bucket_id = 2 [(buf.validate.field).uint32.gt = 0];
  int32 server_id = 3;
  int32 map_id = 4;
}

message QueryMatchesResponse {
  uint64 count = 1;
  repeated MatchOverview matches = 2;
}

message QueryStatsRequest {
  database.query.v1.Filter filter = 1;
  uint32 stats_bucket_id = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).uint32.gt = 0
  ];
  TimeBucket time_bucket = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];
  Variant variant = 4 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];
  string variant_key = 5;
  google.protobuf.Timestamp time = 6 [(buf.validate.field).required = true /* (buf.validate.field).timestamp.lt_now = true */];
}

message QueryStatsResponse {
  Variant variant = 1;
  uint64 count = 2;
  oneof stat_container {
    VariantStatsContainer stats_variant = 3;
  }
}

message VariantStats {
  string variant = 1;
  uint64 rank = 2;
  person.v1.PersonDisplay player = 3;
  uint64 kills = 4;
  uint64 assists = 5;
  uint64 deaths = 6;
  uint64 postround_kills = 7;
  uint64 postround_assists = 8;
  uint64 postround_deaths = 9;
  uint64 damage = 10;
  uint64 damage_taken = 11;
  uint64 dominations = 12;
  uint64 dominated = 13;
  uint64 revenges = 14;
  uint64 revenged = 15;
  uint64 airshots = 16;
  uint64 headshot_kills = 17;
  uint64 backstab_kills = 18;
  uint64 headshots = 19;
  uint64 backstabs = 20;
  uint64 was_headshot = 21;
  uint64 was_backstabbed = 22;
  uint64 preround_healing = 23;
  uint64 healing = 24;
  uint64 postround_healing = 25;
  uint64 drops = 26;
  uint64 near_full_charge_death = 27;
  uint64 charges_uber = 28;
  uint64 charges_kritz = 29;
  uint64 charges_vacc = 30;
  uint64 charges_quickfix = 31;
}

message VariantStatsContainer {
  repeated VariantStats stats = 1;
}

message MatchRequest {
  string match_id = 1 [(buf.validate.field).string.uuid = true];
}

message MatchResponse {
  Match match = 1;
}

message MatchOverview {
  string match_id = 1;
  int32 server_id = 2;
  string server_name = 3;
  string server_name_short = 4;
  int32 demo_id = 5;
  maps.v1.Map map = 6;
  string stats_bucket_name = 7;
  int32 stats_bucket_id = 8;
  string hostname = 9;
  uint32 score_red = 10;
  uint32 score_blu = 12;
  google.protobuf.Timestamp start_time = 13;
  uint64 duration = 14;
  google.protobuf.Timestamp created_on = 15;
  string asset_id = 16 [(buf.validate.field).string.uuid = true];
}

message MatchChatLog {
  int64 person_message_id = 1 [(buf.validate.field).required = true];
  int64 steam_id = 2 [(buf.validate.field).required = true];
  string body = 3 [(buf.validate.field).required = true];
  int32 demo_tick = 4 [(buf.validate.field).required = true];
  string name = 5 [(buf.validate.field).required = true];
}

message Match {
  MatchOverview overview = 1 [(buf.validate.field).required = true];
  repeated Round rounds = 2 [(buf.validate.field).required = true];
  repeated MatchChatLog chat_logs = 3 [(buf.validate.field).required = true];
  map<string, person.v1.PersonDisplay> players = 4 [(buf.validate.field).required = true];
}

message Round {
  uint32 round_id = 1;
  Team winner = 2;
  bool is_stalemate = 3;
  bool is_sudden_death = 4;
  uint64 duration_ms = 5;

  repeated RoundPlayer players = 6;
}

message RoundPlayer {
  uint32 round_id = 1;
  person.v1.PersonDisplay person = 2 [(buf.validate.field).required = true];
  Team team = 3;
  bool mvp = 4;
  uint64 tick_start = 5;
  uint64 tick_end = 6;
  uint64 points = 7;
  uint64 connection_count = 8;
  uint64 bonus_points = 9;
  uint64 kills = 10;
  uint64 assists = 11;
  uint64 deaths = 12;
  uint64 postround_kills = 13;
  uint64 postround_assists = 14;
  uint64 preround_healing = 15;
  uint64 healing = 16;
  uint64 drops = 17;
  uint64 near_full_charge_death = 18;
  uint64 charges_uber = 19;
  uint64 charges_kritz = 20;
  uint64 charges_vacc = 21;
  uint64 charges_quickfix = 22;
  uint64 damage = 23;
  uint64 damage_taken = 24;
  uint64 dominations = 25;
  uint64 dominated = 26;
  uint64 revenges = 27;
  uint64 revenged = 28;
  uint64 airshots = 29;
  uint64 headshots = 30;
  uint64 headshot_kills = 31;
  uint64 backstabs = 32;
  uint64 backstab_kills = 33;
  uint64 was_headshot = 34;
  uint64 was_backstabbed = 35;
  uint64 shots = 36;
  uint64 hits = 37;
  uint64 objects_built = 38;
  uint64 objects_destroyed = 39;
  uint64 scoreboard_kills = 40;
  uint64 scoreboard_assists = 41;
  uint64 scoreboard_deaths = 42;
  uint64 postround_deaths = 43;
  uint64 captures = 44;
  uint64 captures_blocked = 45;
  uint64 scoreboard_damage = 46;
  uint64 extinguishes = 47;
  uint64 ignites = 48;
  uint64 buildings_built = 49;
  uint64 buildings_destroyed = 50;

  repeated RoundPlayerVariant variants = 100;
}

message RoundPlayerVariant {
  string variant = 1;
  uint32 round_id = 2;
  int64 steam_id = 3 [(buf.validate.field).int64 = {gte: 76561197960265729}];
  uint64 kills = 4;
  uint64 assists = 5;
  uint64 deaths = 6;
  uint64 postround_kills = 7;
  uint64 postround_assists = 8;
  uint64 postround_deaths = 9;
  uint64 damage = 10;
  uint64 damage_taken = 11;
  uint64 dominations = 12;
  uint64 dominated = 13;
  uint64 revenges = 14;
  uint64 revenged = 15;
  uint64 airshots = 16;
  uint64 headshot_kills = 17;
  uint64 backstab_kills = 18;
  uint64 headshots = 19;
  uint64 backstabs = 20;
  uint64 was_headshot = 21;
  uint64 was_backstabbed = 22;
  uint64 preround_healing = 23;
  uint64 healing = 24;
  uint64 postround_healing = 25;
  uint64 drops = 26;
  uint64 near_full_charge_death = 27;
  uint64 charges_uber = 28;
  uint64 charges_kritz = 29;
  uint64 charges_vacc = 30;
  uint64 charges_quickfix = 31;
}
