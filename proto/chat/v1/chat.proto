edition = "2023";

package chat.v1;

import "buf/validate/validate.proto";
import "database/query/v1/filter.proto";
import "google/protobuf/timestamp.proto";

service ChatService {
  rpc Query(QueryRequest) returns (QueryResponse) {}
  rpc QueryContext(QueryContextRequest) returns (QueryContextResponse) {}
}

message QueryContextRequest {
  int64 person_message_id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).int64 = {gt: 0}
  ];
  int32 padding = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).int32 = {
      gt: 0
      lt: 250
    }
  ];
}

message QueryContextResponse {
  repeated Message messages = 1 [(buf.validate.field).required = true];
}

message QueryRequest {
  database.query.v1.Filter filter = 1;
  string query = 2;
  int32 server_id = 3 [(buf.validate.field).int32 = {gt: 0}];
  google.protobuf.Timestamp date_start = 4;
  google.protobuf.Timestamp date_end = 5;
  bool flagged_only = 6;
  int64 steam_id = 7 [(buf.validate.field).int64 = {gte: 76561197960265729}];
}

message QueryResponse {
  repeated Message messages = 1 [(buf.validate.field).required = true];
  int64 count = 2 [(buf.validate.field).required = true];
}

message Message {
  int64 person_message_id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).int64 = {gt: 0}
  ];
  string match_id = 2 [(buf.validate.field).string.uuid = true];
  int64 steam_id = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).int64 = {gte: 76561197960265729}
  ];
  string avatar_hash = 4 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.len = 40
  ];
  string persona_name = 5 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 2
      max_len: 32
    }
  ];
  string server_name = 6 [(buf.validate.field).required = true];
  int32 server_id = 7 [
    (buf.validate.field).required = true,
    (buf.validate.field).int32 = {gt: 0}
  ];
  string body = 8 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 128
    }
  ];
  bool team = 9 [(buf.validate.field).required = true];
  google.protobuf.Timestamp created_on = 10 [(buf.validate.field).required = true];
  int32 auto_filter_flagged = 11 [(buf.validate.field).required = true];
}
