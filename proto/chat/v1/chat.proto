edition = "2023";

package chat.v1;

import "filter.proto";
import "google/protobuf/timestamp.proto";

service ChatService {
  rpc Query(QueryRequest) returns (QueryResponse) {}
  rpc QueryContext(QueryContextRequest) returns (QueryContextResponse) {}
}

message QueryContextRequest {
  int64 person_message_id = 1;
  int32 padding = 2;
}

message QueryContextResponse {
  repeated Message messages = 1;
}

message QueryRequest {
  Filter filter = 1;
  string query = 2;
  int32 server_id = 3;
  google.protobuf.Timestamp date_start = 4;
  google.protobuf.Timestamp date_end = 5;
  bool flagged_only = 6;
}

message QueryResponse {
  repeated Message messages = 1;
}

message Message {
  int64 person_message_id = 1;
  string match_id = 2;
  string steam_id = 3;
  string avatar_hash = 4;
  string persona_name = 5;
  string server_name = 6;
  int32 server_id = 7;
  string body = 8;
  bool team = 9;
  google.protobuf.Timestamp created_on = 10;
  int64 auto_filter_flagged = 11;
}
