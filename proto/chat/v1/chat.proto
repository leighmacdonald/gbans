edition = "2023";

package chat.v1;

import "buf/validate/validate.proto";
import "database/query/v1/filter.proto";
import "google/protobuf/timestamp.proto";

service ChatService {
  rpc Query(QueryRequest) returns (QueryResponse) {}
  rpc QueryContext(QueryContextRequest) returns (QueryContextResponse) {}
}

message QueryContextRequest {
  int64 person_message_id = 1 [(buf.validate.field).required = true];
  int32 padding = 2 [(buf.validate.field).required = true];
}

message QueryContextResponse {
  repeated Message messages = 1 [(buf.validate.field).required = true];
}

message QueryRequest {
  database.query.v1.Filter filter = 1;
  string query = 2;
  int32 server_id = 3;
  google.protobuf.Timestamp date_start = 4;
  google.protobuf.Timestamp date_end = 5;
  bool flagged_only = 6;
  int64 steam_id = 7;
}

message QueryResponse {
  repeated Message messages = 1 [(buf.validate.field).required = true];
  int64 count = 2 [(buf.validate.field).required = true];
}

message Message {
  int64 person_message_id = 1 [(buf.validate.field).required = true];
  string match_id = 2 [(buf.validate.field).required = true];
  int64 steam_id = 3 [(buf.validate.field).required = true];
  string avatar_hash = 4 [(buf.validate.field).required = true];
  string persona_name = 5 [(buf.validate.field).required = true];
  string server_name = 6 [(buf.validate.field).required = true];
  int32 server_id = 7 [(buf.validate.field).required = true];
  string body = 8 [(buf.validate.field).required = true];
  bool team = 9 [(buf.validate.field).required = true];
  google.protobuf.Timestamp created_on = 10 [(buf.validate.field).required = true];
  int32 auto_filter_flagged = 11 [(buf.validate.field).required = true];
}
