edition = "2023";

package notification.v1;

import "filter.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service NotificationService {
  rpc Notifications(google.protobuf.Empty) returns (NotificationsResponse) {}
  rpc MarkRead(MarkReadRequest) returns (google.protobuf.Empty) {}
  rpc MarkReadAll(google.protobuf.Empty) returns (MarkReadAllResponse) {}
  rpc DeleteAll(google.protobuf.Empty) returns (DeleteAllResponse) {}
  rpc Delete(DeleteRequest) returns (DeleteAllResponse) {}
}

message NotificationsResponse {
  UserNotification notifications = 1;
}

message DeleteRequest {
  repeated int32 message_id = 1;
}

message MarkReadRequest {
  repeated int32 message_id = 1;
}

message MarkReadAllResponse {
  int32 changed = 1;
}

message DeleteAllResponse {
  int32 changed = 1;
}

enum Severity {
  SEVERITY_INFO_UNSPECIFIED = 0;
  SEVERITY_WARN = 1;
  SEVERITY_ERROR = 2;
}

message UserNotification {
  int64 person_notification_id = 1;
  string steam_id = 2;
  bool read = 3;
  bool deleted = 4;
  Severity severity = 5;
  string message = 6;
  string link = 7;
  int32 count = 8;
  google.protobuf.Timestamp created_on = 9;
}
