edition = "2023";

package config.v1;

import "buf/validate/validate.proto";
import "google/protobuf/descriptor.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service ConfigService {
  rpc Info(google.protobuf.Empty) returns (InfoResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
  rpc Get(google.protobuf.Empty) returns (GetResponse) {}
  rpc Update(UpdateRequest) returns (UpdateResponse) {}

  rpc Changelog(google.protobuf.Empty) returns (ChangelogResponse) {}
}

message ChangelogResponse {
  repeated GithubRelease changelog = 1 [(buf.validate.field).required = true];
}

message InfoResponse {
  string site_name = 1 [(buf.validate.field).required = true];
  string site_description = 2 [(buf.validate.field).required = true];
  string asset_url = 3 [(buf.validate.field).required = true];
  string favicon = 4 [(buf.validate.field).required = true];
  string link_id = 5 [(buf.validate.field).required = true];
  string app_version = 6 [(buf.validate.field).required = true];
  string sentry_dsn_web = 7 [(buf.validate.field).required = true];
  string document_policy = 8 [(buf.validate.field).required = true];
  string patreon_client_id = 9 [(buf.validate.field).required = true];
  string discord_client_id = 10 [(buf.validate.field).required = true];
  bool discord_enabled = 11 [(buf.validate.field).required = true];
  bool patreon_enabled = 12 [(buf.validate.field).required = true];
  string default_route = 13 [(buf.validate.field).required = true];
  bool news_enabled = 14 [(buf.validate.field).required = true];
  bool contests_enabled = 15 [(buf.validate.field).required = true];
  bool wiki_enabled = 16 [(buf.validate.field).required = true];
  bool stats_enabled = 17 [(buf.validate.field).required = true];
  bool servers_enabled = 18 [(buf.validate.field).required = true];
  bool reports_enabled = 19 [(buf.validate.field).required = true];
  bool chatlogs_enabled = 20 [(buf.validate.field).required = true];
  bool demos_enabled = 21 [(buf.validate.field).required = true];
  bool speedruns_enabled = 22 [(buf.validate.field).required = true];
  bool forums_enabled = 23 [(buf.validate.field).required = true];
  bool mge_enabled = 24 [(buf.validate.field).required = true];
}

message GetResponse {
  Config config = 1 [(buf.validate.field).required = true];
}

message UpdateRequest {
  Config config = 1 [(buf.validate.field).required = true];
}

message UpdateResponse {
  Config config = 1 [(buf.validate.field).required = true];
}

enum RunMode {
  RUN_MODE_RELEASE_UNSPECIFIED = 0;
  RUN_MODE_DEBUG = 1;
  RUN_MODE_TEST = 3;
}

enum FileServeMode {
  FILE_SERVE_MODE_LOCAL_UNSPECIFIED = 0;
}

message General {
  string site_name = 1 [(buf.validate.field).required = true];
  string site_description = 2 [(buf.validate.field).required = true];
  RunMode mode = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];
  FileServeMode file_serve_mode = 4 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];
  string srcds_log_addr = 5 [(buf.validate.field).required = true];
  string asset_url = 6 [(buf.validate.field).required = true];
  string favicon = 7 [(buf.validate.field).required = true];
  string default_route = 8 [(buf.validate.field).required = true];
  bool news_enabled = 9 [(buf.validate.field).required = true];
  bool forums_enabled = 10 [(buf.validate.field).required = true];
  bool contests_enabled = 11 [(buf.validate.field).required = true];
  bool wiki_enabled = 12 [(buf.validate.field).required = true];
  bool stats_enabled = 13 [(buf.validate.field).required = true];
  bool servers_enabled = 14 [(buf.validate.field).required = true];
  bool reports_enabled = 15 [(buf.validate.field).required = true];
  bool chatlogs_enabled = 16 [(buf.validate.field).required = true];
  bool demos_enabled = 17 [(buf.validate.field).required = true];
  bool speedruns_enabled = 18 [(buf.validate.field).required = true];
  string sentry_dsn = 19 [(buf.validate.field).required = true];
  string sentry_dsn_web = 20 [(buf.validate.field).required = true];
}

message Debug {
  bool skip_open_id_validation = 1 [(buf.validate.field).required = true];
  string add_rcon_log_address = 2 [(buf.validate.field).required = true];
}

enum DemoStrategy {
  DEMO_STRATEGY_PCTFREE_UNSPECIFIED = 0;
  DEMO_STRATEGY_COUNT = 1;
}

message Demo {
  bool cleanup_enabled = 1 [(buf.validate.field).required = true];
  DemoStrategy strategy = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];
  float cleanup_min_pct = 3 [(buf.validate.field).required = true];
  string cleanup_mount = 4 [(buf.validate.field).required = true];
  int64 count_limit = 5 [(buf.validate.field).required = true];
  string parser_url = 6 [(buf.validate.field).required = true];
}

message Filters {
  bool enabled = 1 [(buf.validate.field).required = true];
  int32 warning_timeout = 2 [(buf.validate.field).required = true];
  int32 warning_limit = 3 [(buf.validate.field).required = true];
  bool dry = 4 [(buf.validate.field).required = true];
  bool ping_discord = 5 [(buf.validate.field).required = true];
  int32 max_weight = 6 [(buf.validate.field).required = true];
  int32 check_timeout = 7 [(buf.validate.field).required = true];
  int32 match_timeout = 8 [(buf.validate.field).required = true];
}

message Discord {
  bool enabled = 1 [(buf.validate.field).required = true];
  bool bot_enabled = 2 [(buf.validate.field).required = true];
  bool integrations_enabled = 3 [(buf.validate.field).required = true];
  string app_id = 4 [(buf.validate.field).required = true];
  string app_secret = 5 [(buf.validate.field).required = true];
  string link_id = 6 [(buf.validate.field).required = true];
  string token = 7 [(buf.validate.field).required = true];
  string guild_id = 8 [(buf.validate.field).required = true];
  bool public_log_channel_enable = 9 [(buf.validate.field).required = true];
  string log_channel_id = 10 [(buf.validate.field).required = true];
  string public_match_log_channel_id = 11 [(buf.validate.field).required = true];
  string vote_log_channel_id = 12 [(buf.validate.field).required = true];
  string appeal_log_channel_id = 13 [(buf.validate.field).required = true];
  string ban_log_channel_id = 14 [(buf.validate.field).required = true];
  string forum_log_channel_id = 15 [(buf.validate.field).required = true];
  string kick_log_channel_id = 16 [(buf.validate.field).required = true];
  string mod_ping_role_id = 17 [(buf.validate.field).required = true];
  string anticheat_channel_id = 18 [(buf.validate.field).required = true];
  string seed_channel_id = 19 [(buf.validate.field).required = true];
  string word_filter_log_channel_id = 20 [(buf.validate.field).required = true];
  string chat_log_channel_id = 21 [(buf.validate.field).required = true];
}

message Sourcemod {
  bool center_projectiles = 1 [(buf.validate.field).required = true];
}

enum Level {
  LEVEL_ERROR_UNSPECIFIED = 0;
  LEVEL_WARNING = 1;
  LEVEL_INFO = 2;
  LEVEL_DEBUG = 3;
}

message Log {
  Level level = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];
  string file = 2 [(buf.validate.field).required = true];
  bool http_enabled = 3 [(buf.validate.field).required = true];
  bool http_otel_enabled = 4 [(buf.validate.field).required = true];
  Level http_level = 5 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];
}

message GeoLocation {
  bool enabled = 1 [(buf.validate.field).required = true];
  string cache_path = 2 [(buf.validate.field).required = true];
  string token = 3 [(buf.validate.field).required = true];
}

message Patreon {
  bool enabled = 1 [(buf.validate.field).required = true];
  bool integrations_enabled = 2 [(buf.validate.field).required = true];
  string client_id = 3 [(buf.validate.field).required = true];
  string client_secret = 4 [(buf.validate.field).required = true];
  string creator_access_token = 5 [(buf.validate.field).required = true];
  string creator_refresh_token = 6 [(buf.validate.field).required = true];
}

enum HostKeyStrategy {
  HOST_KEY_STRATEGY_AUTO_ACCEPT_UNSPECIFIED = 0;
  HOST_KEY_STRATEGY_ACCEPT_FIRST = 1;
  HOST_KEY_STRATEGY_IGNORE_ALL = 2;
}

message SSH {
  bool enabled = 1 [(buf.validate.field).required = true];
  string username = 2 [(buf.validate.field).required = true];
  int32 port = 3 [(buf.validate.field).required = true];
  string private_key_path = 4 [(buf.validate.field).required = true];
  HostKeyStrategy host_key_strategy = 5 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];
  string password = 6 [(buf.validate.field).required = true];
  int32 update_interval = 7 [(buf.validate.field).required = true];
  int32 timeout = 8 [(buf.validate.field).required = true];
  string demo_path_fmt = 9 [(buf.validate.field).required = true];
  string stac_path = 10 [(buf.validate.field).required = true];
}

message Network {
  bool sdr_enabled = 1 [(buf.validate.field).required = true];
  bool sdr_dns_enabled = 2 [(buf.validate.field).required = true];
  string cf_key = 3 [(buf.validate.field).required = true];
  string cf_email = 4 [(buf.validate.field).required = true];
  string cf_zone_id = 5 [(buf.validate.field).required = true];
}

message LocalStore {
  string path_root = 1 [(buf.validate.field).required = true];
}

message Exports {
  bool bd_enabled = 1 [(buf.validate.field).required = true];
  bool valve_enabled = 2 [(buf.validate.field).required = true];
  repeated string authorized_keys = 3 [(buf.validate.field).required = true];
}

enum Action {
  ACTION_KICK_UNSPECIFIED = 0;
  ACTION_GAG = 1;
  ACTION_BAN = 2;
}

message Anticheat {
  bool enabled = 1 [(buf.validate.field).required = true];
  Action action = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];
  int32 duration = 3 [(buf.validate.field).required = true];
  int32 max_aim_snaps = 4 [(buf.validate.field).required = true];
  int32 max_psilent = 5 [(buf.validate.field).required = true];
  int32 max_bhop = 6 [(buf.validate.field).required = true];
  int32 max_fake_ang = 7 [(buf.validate.field).required = true];
  int32 max_cmd_num = 8 [(buf.validate.field).required = true];
  int32 max_too_many_connections = 9 [(buf.validate.field).required = true];
  int32 max_oob_var = 10 [(buf.validate.field).required = true];
  int32 max_invalid_user_cmd = 11 [(buf.validate.field).required = true];
  int32 max_cheat_cvar = 12 [(buf.validate.field).required = true];
}

message Clientprefs {
  bool center_projectiles = 1 [(buf.validate.field).required = true];
}

message Config {
  General general = 1 [(buf.validate.field).required = true];
  Debug debug = 2 [(buf.validate.field).required = true];
  Demo demo = 3 [(buf.validate.field).required = true];
  Filters filters = 4 [(buf.validate.field).required = true];
  Discord discord = 5 [(buf.validate.field).required = true];
  Clientprefs client_prefs = 6 [(buf.validate.field).required = true];
  Log log = 7 [(buf.validate.field).required = true];
  GeoLocation geo_location = 8 [(buf.validate.field).required = true];
  Patreon patreon = 9 [(buf.validate.field).required = true];
  SSH ssh = 10 [(buf.validate.field).required = true];
  Network network = 11 [(buf.validate.field).required = true];
  LocalStore local_store = 12 [(buf.validate.field).required = true];
  Exports exports = 13 [(buf.validate.field).required = true];
  Anticheat anticheat = 14 [(buf.validate.field).required = true];
}

message GithubRelease {
  message Author {
    string login = 1;
    int32 id = 2;
    string node_id = 3;
    string avatar_url = 4;
    string gravatar_url = 5;
    string url = 6;
    string html_url = 7;
    string followers_url = 8;
    string following_url = 9;
    string gists_url = 10;
    string started_url = 11;
    string subscriptions_url = 12;
    string organizations_url = 13;
    string repos_url = 14;
    string events_url = 15;
    string received_events_url = 16;
    string type = 17;
    bool site_admin = 18;
  }

  message Asset {
    string url = 1;
    string browser_download_url = 2;
    int32 id = 3;
    string node_id = 4;
    string name = 5;
    string label = 6;
    string state = 7;
    string content_type = 8;
    int64 size = 9;
    int32 download_count = 10;
    google.protobuf.Timestamp created_at = 11;
    google.protobuf.Timestamp updated_at = 12;
    Author uploader = 13;
  }

  string url = 1;
  string html_url = 2;
  string asset_url = 3;
  string upload_url = 4;
  string tarball_url = 5;
  int32 id = 6;
  string node_id = 7;
  string tag_name = 8;
  string target_commitish = 9;
  string name = 10;
  string body = 11;
  bool draft = 12;
  bool prerelease = 13;
  google.protobuf.Timestamp created_at = 14;
  google.protobuf.Timestamp published_at = 15;

  Author author = 16;
}
