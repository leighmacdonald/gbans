edition = "2023";

package servers.v1;

import "buf/validate/validate.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service DemoService {
  rpc GetDemos(google.protobuf.Empty) returns (GetDemosResponse);
  rpc RunCleanup(google.protobuf.Empty) returns (google.protobuf.Empty);
}

message GetDemosResponse {
  repeated Demo demos = 1 [(buf.validate.field).required = true];
}

message Demo {
  int64 demo_id = 1 [(buf.validate.field).required = true];
  int32 server_id = 2 [(buf.validate.field).required = true];
  string server_name_short = 3 [(buf.validate.field).required = true];
  string server_name_long = 4 [(buf.validate.field).required = true];
  string title = 5 [(buf.validate.field).required = true];
  google.protobuf.Timestamp created_on = 6 [(buf.validate.field).required = true];
  int64 downloads = 7 [(buf.validate.field).required = true];
  int64 size = 8 [(buf.validate.field).required = true];
  string map_name = 9 [(buf.validate.field).required = true];
  bool archive = 10 [(buf.validate.field).required = true];
  map<string, string> stats = 11;
  string asset_id = 12 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];
}
