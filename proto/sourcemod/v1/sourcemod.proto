    (buf.validate.field).int32.lte = 100
  ];
  repeated Group groups = 9 [(buf.validate.field).required = true];
  google.protobuf.Timestamp created_on = 10 [(buf.validate.field).required = true];
  google.protobuf.Timestamp updated_on = 11 [(buf.validate.field).required = true];
