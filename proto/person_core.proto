edition = "2023";

import "google/protobuf/timestamp.proto";
import "privilege.proto";

message PersonCore {
  string steam_id = 1;
  Privilege permission_level = 2;
  string name = 3;
  string avatar_hash = 4;
  string discord_id = 5;
  int32 vac_bans = 6;
  int32 game_bans = 7;
  int64 ban_id = 8;
  google.protobuf.Timestamp time_created = 9;
}
