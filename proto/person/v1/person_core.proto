edition = "2023";

package person.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";
import "person/v1/privilege.proto";

message PersonCore {
  int64 steam_id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).int64 = {gte: 76561197960265729}
  ];
  person.v1.Privilege permission_level = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];
  string name = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 2
      max_len: 32
    }
  ];
  string avatar_hash = 4 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.len = 40
  ];
  string discord_id = 5;
  string patreon_id = 6;
  int32 vac_bans = 7 [
    (buf.validate.field).required = true,
    (buf.validate.field).int32 = {gte: 0}
  ];
  int32 game_bans = 8 [
    (buf.validate.field).required = true,
    (buf.validate.field).int32 = {gte: 0}
  ];
  int32 ban_id = 9 [
    (buf.validate.field).required = true,
    (buf.validate.field).int32 = {gte: 0}
  ];
  google.protobuf.Timestamp time_created = 10 [(buf.validate.field).required = true];
}
