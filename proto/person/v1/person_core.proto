edition = "2023";

package person.v1;

import "google/protobuf/timestamp.proto";
import "person/v1/privilege.proto";

message PersonCore {
  int64 steam_id = 1;
  person.v1.Privilege permission_level = 2;
  string name = 3;
  string avatar_hash = 4;
  string discord_id = 5;
  int32 vac_bans = 6;
  int32 game_bans = 7;
  int64 ban_id = 8;
  google.protobuf.Timestamp time_created = 9;
}
