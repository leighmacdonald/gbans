edition = "2023";

package forum.v1;

import "buf/validate/validate.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "person/v1/privilege.proto";

service ForumService {
  rpc ActiveUsers(google.protobuf.Empty) returns (ActiveUsersResponse) {}
  rpc Overview(google.protobuf.Empty) returns (OverviewResponse) {}
  rpc RecentMessages(google.protobuf.Empty) returns (RecentMessagesResponse) {}

  rpc Thread(ThreadRequest) returns (ThreadResponse) {}
  rpc Threads(ThreadsRequest) returns (ThreadsResponse) {}
  rpc ThreadDelete(ThreadDeleteRequest) returns (google.protobuf.Empty) {}
  rpc ThreadMessages(ThreadMessagesRequest) returns (ThreadMessagesResponse) {}
  rpc ThreadCreate(ThreadCreateRequest) returns (ThreadCreateResponse) {}
  rpc ThreadEdit(ThreadEditRequest) returns (ThreadEditResponse) {}
  rpc ThreadReplyCreate(ThreadReplyCreateRequest) returns (ThreadReplyCreateResponse) {}
  rpc ThreadReplyEdit(ThreadReplyEditRequest) returns (ThreadReplyEditResponse) {}
  rpc ThreadMessageDelete(ThreadMessageDeleteRequest) returns (google.protobuf.Empty) {}

  rpc CategoryCreate(CategoryCreateRequest) returns (CategoryCreateResponse) {}
  rpc CategoryEdit(CategoryEditRequest) returns (CategoryEditResponse) {}
  rpc Category(CategoryRequest) returns (CategoryResponse) {}

  rpc Forum(ForumRequest) returns (ForumResponse) {}
  rpc ForumCreate(ForumCreateRequest) returns (ForumCreateResponse) {}
  rpc ForumEdit(ForumEditRequest) returns (ForumEditResponse) {}
}

message ThreadEditRequest {
  int32 forum_thread_id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).int32.gt = 0
  ];
  string title = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string = {
      min_len: 2
      max_len: 256
    }
  ];
  bool sticky = 3 [(buf.validate.field).required = true];
  bool locked = 4 [(buf.validate.field).required = true];
}

message ThreadEditResponse {
  Thread thread = 1 [(buf.validate.field).required = true];
}

message ForumEditResponse {
  Forum forum = 1 [(buf.validate.field).required = true];
}

