    (buf.validate.field).int64.gt = 0
  ];
  int32 forum_thread_id = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).int32.gt = 0
  ];
  int64 source_id = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).int64 = {gte: 76561197960265729}
  ];
  string body_md = 4 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1
  ];
  string title = 5; // FIXME is this needed? title message??
  bool online = 6 [(buf.validate.field).required = true];
  string signature = 7 [(buf.validate.field).required = true];
  string persona_name = 8 [(buf.validate.field).required = true];
  string avatar_hash = 9 [(buf.validate.field).required = true];
  person.v1.Privilege permission_level = 10 [
    (buf.validate.field).required = true,
    (buf.validate.field).int64 = {gte: 76561197960265729}
  ];
  google.protobuf.Timestamp created_on = 11 [(buf.validate.field).required = true];
  google.protobuf.Timestamp updated_on = 12 [(buf.validate.field).required = true];
}

