message Thread {
  int32 forum_id = 1 [(buf.validate.field).required = true];
  int32 forum_thread_id = 2 [(buf.validate.field).required = true];
  int64 source_id = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).int64 = {gte: 76561197960265729}
  ];
  string title = 4 [(buf.validate.field).required = true];
  bool sticky = 5 [(buf.validate.field).required = true];
  bool locked = 6 [(buf.validate.field).required = true];
  int32 replies = 7 [(buf.validate.field).required = true];
  int32 views = 8 [(buf.validate.field).required = true];
  google.protobuf.Timestamp created_on = 9 [(buf.validate.field).required = true];
  google.protobuf.Timestamp updated_on = 10 [(buf.validate.field).required = true];
}

message ThreadWithSource {
  Thread thread = 1 [(buf.validate.field).required = true];
  string persona_name = 2 [(buf.validate.field).required = true];
  string avatar_hash = 3 [(buf.validate.field).required = true];
  person.v1.Privilege permission_level = 4 [
    (buf.validate.field).required = true,
    (buf.validate.field).enum.defined_only = true
  ];
  int64 recent_forum_message_id = 5;
  google.protobuf.Timestamp recent_created_on = 6;
  int64 recent_steam_id = 7 [(buf.validate.field).int64 = {gte: 76561197960265729}];
  string recent_persona_name = 8;
  string recent_avatar_hash = 9;
}

