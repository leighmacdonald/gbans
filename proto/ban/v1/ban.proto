edition = "2023";

package ban.v1;

import "buf/validate/validate.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

enum BanType {
  BAN_TYPE_OK_UNSPECIFIED = 0;
  BAN_TYPE_NO_COMM = 1;
  BAN_TYPE_BANNED = 2;
  BAN_TYPE_NETWORK = 3;
}

enum AppealState {
  APPEAL_STATE_OPEN_UNSPECIFIED = 0;
  APPEAL_STATE_DENIED = 1;
  APPEAL_STATE_ACCEPTED = 2;
  APPEAL_STATE_REDUCED = 3;
  APPEAL_STATE_NO_APPEAL = 4;
}

enum BanReason {
  BAN_REASON_UNSPECIFIED = 0;
  BAN_REASON_CUSTOM = 1;
  BAN_REASON_EXTERNAL = 2;
  BAN_REASON_CHEATING = 3;
  BAN_REASON_RACISM = 4;
  BAN_REASON_HARASSMENT = 5;
  BAN_REASON_EXPLOITING = 6;
  BAN_REASON_WARNINGS_EXCEEDED = 7;
  BAN_REASON_SPAM = 8;
  BAN_REASON_LANGUAGE = 9;
  BAN_REASON_PROFILE = 10;
  BAN_REASON_ITEM_DESCRIPTIONS = 11;
  BAN_REASON_BOT_HOST = 12;
  BAN_REASON_EVADING = 13;
  BAN_REASON_USERNAME = 14;
}

service BanService {
  rpc Query(QueryRequest) returns (QueryResponse) {}
  // rpc ExportValve(google.protobuf.Empty) returns (ExportValveResponse) {}
  rpc Delete(DeleteRequest) returns (google.protobuf.Empty) {}
  rpc Get(GetRequest) returns (GetResponse) {}
  rpc QuerySourceBans(QuerySourceBansRequest) returns (QuerySourceBansResponse) {}
  rpc Update(UpdateRequest) returns (UpdateResponse) {}
  rpc Create(CreateRequest) returns (CreateResponse) {}
}

message CreateRequest {
  int64 target_id = 1 [(buf.validate.field).required = true];
  int64 source_id = 2;
  google.protobuf.Duration duration = 3;
  BanType ban_type = 4 [(buf.validate.field).required = true];
  BanReason reason = 5 [(buf.validate.field).required = true];
  string reason_text = 6 [(buf.validate.field).required = true];
  Origin origin = 7 [(buf.validate.field).required = true];
  int64 report_id = 8;
  string cidr = 9 [(buf.validate.field).required = true];
  bool evade_ok = 10 [(buf.validate.field).required = true];
  string name = 11 [(buf.validate.field).required = true];
  int32 demo_tick = 12;
  string demo_name = 13;
  string note = 14 [(buf.validate.field).required = true];
}

message CreateResponse {
  Ban ban = 1;
}

message UpdateRequest {
  BanType ban_type = 1;
  BanReason reason = 2;
  string reason_text = 3;
  string note = 4;
  bool evade_ok = 5;
  google.protobuf.Duration duration = 6;
  string cidr = 7;
  int64 ban_id = 8;
}
message UpdateResponse {
  Ban ban = 1 [(buf.validate.field).required = true];
}

message QuerySourceBansRequest {
  string steam_id = 1 [(buf.validate.field).required = true];
}

message SourceBanRecord {
  int32 ban_id = 1 [(buf.validate.field).required = true];
  string site_name = 2 [(buf.validate.field).required = true];
  int32 site_id = 3 [(buf.validate.field).required = true];
  string persona_name = 4 [(buf.validate.field).required = true];
  int64 steam_id = 5 [(buf.validate.field).required = true];
  string reason = 6 [(buf.validate.field).required = true];
  google.protobuf.Duration duration = 7 [(buf.validate.field).required = true];
  bool permanent = 8 [(buf.validate.field).required = true];
  google.protobuf.Timestamp created_on = 9 [(buf.validate.field).required = true];
}

message QuerySourceBansResponse {
  repeated SourceBanRecord bans = 1 [(buf.validate.field).required = true];
}

message GetRequest {
  int64 ban_id = 1 [(buf.validate.field).required = true];
}

message GetResponse {
  Ban ban = 1 [(buf.validate.field).required = true];
}

message DeleteRequest {
  int64 ban_id = 1 [(buf.validate.field).required = true];
  string reason = 2 [(buf.validate.field).required = true];
}

message QueryRequest {
  int64 source_id = 1;
  int64 target_id = 2;
  bool groups_only = 3;
  bool deleted = 4;
  string cidr = 5;
  bool cidr_only = 6;
  repeated BanReason reason = 7;
  int32 appeal_state = 8;
}

message QueryResponse {
  repeated Ban bans = 1 [(buf.validate.field).required = true];
}

enum Origin {
  ORIGIN_SYSTEM_UNSPECIFIED = 0;
  ORIGIN_BOT = 1;
  ORIGIN_WEB = 2;
  ORIGIN_IN_GAME = 3;
  ORIGIN_REPORTED = 4;
}

message Ban {
  int64 target_id = 1 [(buf.validate.field).required = true];
  int64 source_id = 2 [(buf.validate.field).required = true];
  int64 ban_id = 3 [(buf.validate.field).required = true];
  int64 report_id = 4;
  string last_ip = 5;
  bool evade_ok = 6 [(buf.validate.field).required = true];
  BanType ban_type = 7 [(buf.validate.field).required = true];
  BanReason reason = 8 [(buf.validate.field).required = true];
  string reason_text = 9 [(buf.validate.field).required = true];
  string unban_reason_text = 10 [(buf.validate.field).required = true];
  string note = 11 [(buf.validate.field).required = true];
  Origin origin = 12 [(buf.validate.field).required = true];
  string cidr = 13 [(buf.validate.field).required = true];
  AppealState appeal_state = 14 [(buf.validate.field).required = true];
  string name = 15 [(buf.validate.field).required = true];
  bool deleted = 16 [(buf.validate.field).required = true];
  bool is_enabled = 17 [(buf.validate.field).required = true];
  google.protobuf.Timestamp valid_until = 18 [(buf.validate.field).required = true];
  google.protobuf.Timestamp created_on = 19 [(buf.validate.field).required = true];
  google.protobuf.Timestamp updated_on = 20 [(buf.validate.field).required = true];
  string source_persona_name = 21 [(buf.validate.field).required = true];
  string source_avatar_hash = 22 [(buf.validate.field).required = true];
  string target_persona_name = 23 [(buf.validate.field).required = true];
  string target_avatar_hash = 24 [(buf.validate.field).required = true];
}
